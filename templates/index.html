<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Prediction Form</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <div class="form-card">
            <h1>Loan Prediction</h1>
            <p class="subtitle">Fill in the details to check loan approval status</p>

            <form action="/predict" method="POST">
                <div class="input-group">
                    <label for="gender">Gender</label>
                    <select name="gender" id="gender" required>
                        <option value="">Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="married">Marital Status</label>
                    <select name="married" id="married" required>
                        <option value="">Select</option>
                        <option value="Unmarried">Unmarried</option>
                        <option value="Married">Married</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="credit_History">Credit History</label>
                    <select name="credit_History" id="credit_History" required>
                        <option value="">Select</option>
                        <option value="Unclear Debts">Unclear Debts</option>
                        <option value="Clear Debts">Clear Debts</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="ApplicantIncome">Applicant Income</label>
                    <input type="number" name="ApplicantIncome" id="ApplicantIncome" placeholder="Enter income" required>
                </div>

                <div class="input-group">
                    <label for="LoanAmount">Loan Amount</label>
                    <input type="number" name="LoanAmount" id="LoanAmount" placeholder="Enter loan amount" required>
                </div>

                <button type="submit">Predict Now</button>
            </form>

            {% if prediction_text %}
                <div class="result-box {{ result_class }}">
                    {{ prediction_text }}
                </div>
            {% endif %}
        </div>
    </div>

</body>
</html>
